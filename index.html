<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERSnet - Customer Service</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2a44, #1e5fa8);
  color: white;
  overflow-x: hidden;
}

/* 🔥 BACKGROUND FUTURISTIK */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,200,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,120,255,0.12), transparent 40%),
    repeating-linear-gradient(120deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 40px);
  z-index: 0;
}

/* HEADER */
.header {
  position: relative; /* 🔥 ubah ini */
  margin-top: 30px;
  display: flex;
  justify-content: center;
  z-index: 2;
}

.logo-center {
  width: 300px; /* 🔥 perbesar ukuran */
}

/* CONTAINER */
.container {
  margin: 40px auto;
  max-width: 900px;
  padding: 40px 20px;
  text-align: center;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);

  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);

  position: relative;
  z-index: 2;
}

/* TITLE */
h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

/* 🔥 SUBTITLE */
.subtitle {
  background: #ff8c00;
  color: black;
  padding: 12px 25px;
  border-radius: 10px;
  display: inline-block;
  margin-bottom: 30px;
  font-weight: 600;
}

/* DESC */
.desc {
  font-size: 22px;
  margin-bottom: 30px;
}

/* MENU */
.menu {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* 🔥 BUTTON */
.menu button {
  width: 100%;
  height: 60px;

  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(10px);

  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 30px;

  color: black;
  font-weight: 600;
  font-size: 15px;

  cursor: pointer;
  transition: 0.3s;
}

.menu button:hover {
  background: rgba(255,255,255,0.4);
  transform: scale(1.03);
}

/* CHARACTER */
.character {
  position: fixed;
  right: 10px;
  bottom: 0;
  width: 260px;
  z-index: 2;
}

/* FOOTER */
.footer {
  text-align: center;
  margin: 40px 0 20px;
  font-size: 14px;
  color: rgba(255,255,255,0.8);
}

.footer-logo {
  height: 22px;
  margin-left: 8px;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    margin: 100px 15px;
  }

  h1 { font-size: 28px; }
  .desc { font-size: 16px; }

  .character {
    width: 140px;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="L_ERS.png" class="logo-center">
</div>

<!-- CONTENT -->
<div class="container">
  <h1>Selamat Datang di ERSnet</h1>

  <div class="subtitle">
    Solusi WiFi Cerdas untuk Rumah dan Bisnis Anda
  </div>

  <div class="desc">
    Pilih layanan sesuai kebutuhanmu
  </div>

  <div class="menu">
    <button onclick="goTo('pasang.html')">Pasang Baru</button>
    <button onclick="goTo('gangguan.html')">Lapor Gangguan</button>
    <button onclick="goTo('trackingorder.html')">Lacak Order</button>
    <button onclick="goTo('trackinggangguan.html')">Lacak Tiket</button>
    <button onclick="chatWA()">Chat CS</button>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  Powered By :
  <img src="rsa.png" class="footer-logo">
</div>

<!-- KARAKTER -->
<img src="cs.png" class="character">

<script>
function goTo(page){
  window.location.href = page;
}

/* 🔥 CHAT WHATSAPP */
function chatWA(){
  var nomor = "6282228720985";
  var pesan = "Halo ERSnet 👋\nSaya ingin bertanya terkait layanan internet.\nApakah bisa dibantu?, Terima kasih";

  var url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);

  window.open(url, "_blank");
}
</script>

</body>
</html>
