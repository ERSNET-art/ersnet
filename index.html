<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERSnet - Customer Service</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2a44, #1e5fa8);
  color: white;
  overflow-x: hidden;
}

/* HEADER LOGO */
.header {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo-left {
  width: 120px;
}

.logo-right {
  width: 120px;
}

/* CONTAINER */
.container {
  text-align: center;
  padding: 100px 20px 60px;
}

/* TITLE */
h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

.subtitle {
  background: #f7c948;
  color: black;
  display: inline-block;
  padding: 10px 20px;
  font-weight: 600;
  border-radius: 6px;
  margin-bottom: 40px;
}

/* DESC */
.desc {
  font-size: 28px;
  margin-bottom: 40px;
}

/* MENU */
.menu {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

.menu button {
  width: 180px;
  height: 50px;
  background: #f7c948;
  border: none;
  border-radius: 25px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.menu button:hover {
  background: #ffd86b;
  transform: scale(1.05);
}

/* CHARACTER */
.character {
  position: fixed;
  right: 10px;
  bottom: 0;
  width: 260px;
  z-index: 10;
  transition: 0.3s;
}

.character:hover {
  transform: scale(1.05);
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 40px;
  margin-bottom: 20px;
  font-size: 14px;
  color: rgba(255,255,255,0.8);
}

.footer-logo {
  height: 22px;
  vertical-align: middle;
  margin-left: 8px;
}

/* 📱 MOBILE */
@media (max-width: 768px) {

  h1 { font-size: 30px; }
  .desc { font-size: 18px; }

  .menu button {
    width: 100%;
    max-width: 300px;
  }

  .logo-left, .logo-right {
    width: 90px;
  }

  .character {
    width: 150px;
    right: 5px;
    bottom: 0;
    opacity: 0.95;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="L_LDP.png" class="logo-left">
  <img src="L_ERS.png" class="logo-right">
</div>

<!-- CONTENT -->
<div class="container">
  <h1>Selamat Datang di ERSnet</h1>

  <div class="subtitle">
    Solusi WiFi Cerdas untuk Rumah dan Bisnis Anda.
  </div>

  <div class="desc">
    Ingin lebih dekat dengan kita? yuk pilih menu sesuai kebutuhanmu
  </div>

  <div class="menu">
    <button onclick="goTo('pasang.html')">Pasang Baru</button>
    <button onclick="goTo('gangguan.html')">Lapor Gangguan</button>
    <button onclick="goTo('trackingorder.html')">Lacak Order Pemasangan Baru</button>
    <button onclick="goTo('trackinggangguan.html')">Lacak Tiket Gangguan</button>
    <button onclick="goTo('chat.html')">Chat CS</button>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  Powered By :
  <img src="rsa.png" class="footer-logo">
</div>

<!-- KARAKTER CS -->
<img src="cs.png" class="character">

<script>
function goTo(page){
  window.location.href = page;
}
</script>

</body>
</html>
