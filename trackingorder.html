<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lacak Order - ERSnet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2a44, #1e5fa8);
  color: white;
}

/* HEADER */
.header {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
}

.logo-left, .logo-right {
  width: 100px;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: 120px auto;
  background: white;
  color: black;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
}

/* FORM CENTER */
.form-group {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* INPUT */
input {
  width: 100%;
  max-width: 350px;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  text-align: center;
}

/* BUTTON */
button {
  width: 100%;
  max-width: 350px;
  padding: 12px;
  background: #1e5fa8;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

/* RESULT */
.result {
  margin-top: 20px;
  font-size: 14px;
  line-height: 1.6;
  text-align: left;
  animation: fadeIn 0.5s ease;
}

/* LOADING */
.loader {
  border: 4px solid #eee;
  border-top: 4px solid #1e5fa8;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  margin: 20px auto;
  animation: spin 1s linear infinite;
}

.loading-text {
  text-align: center;
  font-size: 14px;
  color: #555;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

/* CHARACTER */
.character {
  position: fixed;
  right: 10px;
  bottom: 0;
  width: 200px;
}

/* MOBILE */
@media (max-width: 768px) {
  .character {
    width: 120px;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="L_LDP.png" class="logo-left">
  <img src="L_ERS.png" class="logo-right">
</div>

<!-- CONTENT -->
<div class="container">
  <h2>Lacak Order Pemasangan Baru</h2>

  <div class="form-group">
    <input type="text" id="order_id" placeholder="Masukkan Order ID">
    <button id="btnCek" onclick="cekOrder()">Cek Order</button>
  </div>

  <!-- LOADING -->
  <div id="loading" style="display:none;">
    <div class="loader"></div>
    <div class="loading-text">Sedang mencari data...</div>
  </div>

  <!-- HASIL -->
  <div id="hasil" class="result"></div>
</div>

<!-- KARAKTER -->
<img src="cs.png" class="character">

<script>
function cekOrder(){

  var id = document.getElementById("order_id").value;
  var hasil = document.getElementById("hasil");
  var loading = document.getElementById("loading");
  var btn = document.getElementById("btnCek");

  if(!id){
    alert("Masukkan Order ID dulu!");
    return;
  }

  // LOADING ON
  hasil.innerHTML = "";
  loading.style.display = "block";
  btn.disabled = true;
  btn.innerText = "Memproses...";

  fetch("https://script.google.com/macros/s/AKfycbyH-qNN9seTnTJa4KVi6dtfH-6XVC4xivx676aaLKGJl8RQGfiu002ocQfUFdRp-U0OjA/exec?order_id=" + id)
  .then(res => res.json())
  .then(res => {

    if(res.status === "found"){
      hasil.innerHTML = `
        <b>Order ID:</b> ${res.order_id}<br>
        <b>Nama:</b> ${res.nama}<br>
        <b>No HP:</b> ${res.nohp}<br>
        <b>Alamat:</b> ${res.alamat}<br>
        <b>Paket:</b> ${res.paket}<br>
        <b>Lokasi:</b> ${res.lokasi}<br>
        <b>Status:</b> ${res.status_order}
      `;
    } else {
      hasil.innerHTML = "❌ Order tidak ditemukan";
    }

  })
  .catch(() => {
    hasil.innerHTML = "❌ Gagal mengambil data";
  })
  .finally(() => {
    // LOADING OFF
    loading.style.display = "none";
    btn.disabled = false;
    btn.innerText = "Cek Order";
  });
}
</script>

</body>
</html>
