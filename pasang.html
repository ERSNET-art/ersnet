<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasang Baru - ERSnet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2a44, #1e5fa8);
  color: white;
}

/* HEADER */
.header {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
}

.logo-left, .logo-right {
  width: 100px;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: 120px auto;
  background: white;
  color: black;
  padding: 25px;
  border-radius: 15px;
}

/* INPUT */
input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* PAKET */
.paket {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 15px;
}

.card {
  background: #f1f1f1;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  border: 2px solid transparent;
}

.card.active {
  border: 2px solid #1e5fa8;
  background: #e3f0ff;
}

/* BUTTON */
button {
  width: 100%;
  padding: 15px;
  background: #1e5fa8;
  color: white;
  border: none;
  border-radius: 25px;
  font-weight: bold;
  cursor: pointer;
}

/* LOADING */
.loader {
  border: 3px solid #fff;
  border-top: 3px solid #ffd86b;
  border-radius: 50%;
  width: 16px;
  height: 16px;
  animation: spin 1s linear infinite;
  display: inline-block;
  margin-right: 8px;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

/* CHARACTER */
.character {
  position: fixed;
  right: 10px;
  bottom: 0;
  width: 200px;
}

/* MOBILE */
@media (max-width: 768px) {
  .character {
    width: 120px;
  }
}
</style>
</head>

<body>

<div class="header">
  <img src="L_LDP.png" class="logo-left">
  <img src="L_ERS.png" class="logo-right">
</div>

<div class="container">
  <h2 style="text-align:center;">Untuk dapat berlangganan ErsNet Silahkan isi data-data dibawah ini ya,</h2>

  <input type="text" id="nama" placeholder="Nama Lengkap">
  <input type="text" id="nohp" placeholder="Nomor WhatsApp">
  <textarea id="alamat" placeholder="Alamat Lengkap"></textarea>

  <b>Pilih Paket:</b>
  <div class="paket">
    <div class="card" onclick="pilihPaket(this)">15 Mbps<br>125rb</div>
    <div class="card" onclick="pilihPaket(this)">20 Mbps<br>150rb</div>
    <div class="card" onclick="pilihPaket(this)">35 Mbps<br>175rb</div>
    <div class="card" onclick="pilihPaket(this)">55 Mbps<br>230rb</div>
  </div>

  <button onclick="ambilLokasi()">📍 Ambil Lokasi</button>
  <p id="lokasiText"></p>

  <label><b>Masukkan Foto Rumah</b></label>
  <input type="file" id="foto">

  <button id="btnKirim" onclick="kirimData()">Kirim</button>
</div>

<img src="cs.png" class="character">

<script>
let paketDipilih = "";
let lokasi = "";
let fotoBase64 = "";

/* PILIH PAKET */
function pilihPaket(el){
  document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  paketDipilih = el.innerText;
}

/* LOKASI */
function ambilLokasi(){
  navigator.geolocation.getCurrentPosition(function(pos){
    lokasi = pos.coords.latitude + "," + pos.coords.longitude;
    document.getElementById("lokasiText").innerText = "Lokasi: " + lokasi;
  }, function(){
    alert("❌ Gagal ambil lokasi");
  });
}

/* FOTO */
document.getElementById("foto").addEventListener("change", function(){
  let file = this.files[0];
  if(!file) return;

  let reader = new FileReader();
  reader.onloadend = function(){
    fotoBase64 = reader.result;
  }
  reader.readAsDataURL(file);
});

/* KIRIM DATA */
function kirimData(){

  var btn = document.getElementById("btnKirim");

  var nama = document.getElementById("nama").value;
  var nohp = document.getElementById("nohp").value;
  var alamat = document.getElementById("alamat").value;

  if(!nama || !nohp || !alamat || !paketDipilih){
    alert("Data belum Lengkap, silahkan cek kembali data yang anda masukkan!");
    return;
  }

  // LOADING
  btn.innerHTML = '<span class="loader"></span> Mengirim...';
  btn.disabled = true;

  var data = {
    nama: nama,
    nohp: nohp,
    alamat: alamat,
    paket: paketDipilih,
    lokasi: lokasi,
    foto: fotoBase64
  };

  fetch("https://script.google.com/macros/s/AKfycbyH-qNN9seTnTJa4KVi6dtfH-6XVC4xivx676aaLKGJl8RQGfiu002ocQfUFdRp-U0OjA/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {

    if(res.status === "success"){
      alert(
        "Terimakasih telah mempercayai ErsNet sebagai Layanan Internet pilihan anda,\n\n" +
        "Order ID anda adalah: " + res.order_id + "\n\n" +
        "Silahkan cek pada menu Track Order Baru atau hubungi CS."
      );

      window.location.href = "index.html";
    } else {
      alert("❌ Error: " + res.message);
    }

  })
  .catch(err => {
    alert("❌ Gagal kirim data");
    console.error(err);
  })
  .finally(() => {
    btn.innerHTML = "Kirim";
    btn.disabled = false;
  });
}
</script>

</body>
</html>
