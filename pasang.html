<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasang Baru - ERSnet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2a44, #1e5fa8);
  color: white;
}

.header {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: flex-end;
}

.logo-left, .logo-right {
  width: 100px;
}
  
.container {
  max-width: 500px;
  margin: 50px auto;
  background: white;
  color: black;
  padding: 25px;
  border-radius: 15px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1e5fa8;
  color: white;
  margin-top: 5px;
  cursor: pointer;
}

.paket {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: #f1f1f1;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.card.active {
  border: 2px solid #1e5fa8;
  background: #e3f0ff;
}

#map {
  height: 300px;
  border-radius: 10px;
  margin-top: 10px;
  display: none;
}

.loader {
  border: 3px solid #fff;
  border-top: 3px solid yellow;
  border-radius: 50%;
  width: 14px;
  height: 14px;
  display: inline-block;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.character {
  position: fixed;
  right: 10px;
  bottom: 0;
  width: 150px;
}

</style>
</head>

<body>

<div class="header">
  <img src="L_ERS.png" class="logo-right">
</div>

<div class="container">

<h3 style="text-align:center;">Untuk bisa berlangganan layanan ERSnet silahkan isi beberapa data berikut ya,</h3>

<input type="text" id="nama" placeholder="Nama Lengkap">
<input type="text" id="nohp" placeholder="Nomor WhatsApp">
<textarea id="alamat" placeholder="Alamat Lengkap"></textarea>

<b>Pilih Lokasi:</b>
<button onclick="modeLokasi('gps')">📍 Lokasi Saat Ini</button>
<button onclick="modeLokasi('map')">🗺 Pilih di Peta</button>

<p id="lokasiText"></p>
<div id="map"></div>

<!-- 🔥 PAKET DI SINI (SETELAH LOKASI) -->
<div id="paketSection" style="display:none;">
  <b>Pilih Paket:</b>
  <div class="paket" id="paketContainer"></div>
</div>

<label><b>Foto Rumah</b></label>
<input type="file" id="foto">

<button onclick="kirimData()">Kirim</button>

<img src="cs.png" class="character">

</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBdDFUbkc6peaordAoRzWw27JvIHpdcZ4w"></script>

<script>
let paketDipilih="", lokasi="", fotoBase64="";
let mapObj, marker;
let cluster = "";

/* PILIH PAKET */
function pilihPaket(el){
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  paketDipilih = el.innerText;
}

/* MODE LOKASI */
function modeLokasi(mode){

  if(mode==="gps"){
navigator.geolocation.getCurrentPosition(pos=>{
  let lat = pos.coords.latitude;
  let lng = pos.coords.longitude;

  lokasi = lat+","+lng;
  lokasiText.innerText = "Lokasi: "+lokasi;

  // 🔥 coba ambil kabupaten dari koordinat
  getKabupaten(lat,lng);

  // 🔥 fallback otomatis kalau gagal
  setTimeout(()=>{
    if(!cluster){
      console.log("Fallback ke alamat manual...");
      fallbackAlamat();
    }
  }, 2000);

}, ()=>{
  alert("Gagal ambil lokasi");

  // 🔥 fallback kalau GPS gagal total
  fallbackAlamat();
});

    map.style.display="none";
  }

  if(mode==="map"){
    map.style.display="block";
    initMap();
  }
}

/* MAP */
function initMap(){
  if(mapObj) return;

  mapObj = new google.maps.Map(document.getElementById("map"), {
    center:{lat:-7.57,lng:110.82},
    zoom:12
  });

  mapObj.addListener("click", function(e){
    if(marker) marker.setMap(null);

    marker = new google.maps.Marker({
      position:e.latLng,
      map:mapObj
    });

    let lat = e.latLng.lat();
    let lng = e.latLng.lng();

    lokasi = lat+","+lng;
    lokasiText.innerText = "Lokasi dipilih: "+lokasi;

    getKabupaten(lat,lng);
  });
}

/* AMBIL KABUPATEN DARI KOORDINAT */
function getKabupaten(lat, lng){
  const geocoder = new google.maps.Geocoder();

  geocoder.geocode({ location: {lat:lat, lng:lng} }, function(results, status){

    if(status === "OK" && results[0]){
      let kab = "";

      results[0].address_components.forEach(c=>{
        if(c.types.includes("administrative_area_level_2")){
          kab = c.long_name;
        }
      });

      if(!kab){
        fallbackAlamat();
        return;
      }

      lokasiText.innerText += "\nKabupaten: "+kab;

      tentukanCluster(kab);
    } else {
      fallbackAlamat();
    }
  });
}

/* FALLBACK KE ALAMAT MANUAL */
function fallbackAlamat(){
  if(alamat.value){
    lokasiText.innerText += "\nAmbil dari alamat...";
    tentukanCluster(alamat.value);
  } else {
    alert("Kabupaten tidak terbaca & alamat kosong!");
  }
}

/* TENTUKAN CLUSTER */
function tentukanCluster(text){
  text = text.toUpperCase();

  const barat = ["SURAKARTA","SUKOHARJO","BOYOLALI","KLATEN"];
  const timur = ["KARANGANYAR","SRAGEN","WONOGIRI"];

  if(barat.some(k => text.includes(k))){
    cluster = "BARAT";
  } else if(timur.some(k => text.includes(k))){
    cluster = "TIMUR";
  } else {
    cluster = "UNKNOWN";
  }

  lokasiText.innerText += "\nCluster: "+cluster;

  renderPaket();
}

/* RENDER PAKET */
function renderPaket(){
  let el = document.getElementById("paketContainer");
  let section = document.getElementById("paketSection");

  section.style.display = "block";

  if(cluster === "BARAT"){
    el.innerHTML = `
      <div class="card" onclick="pilihPaket(this)">15 Mbps<br>125rb</div>
      <div class="card" onclick="pilihPaket(this)">20 Mbps<br>150rb</div>
      <div class="card" onclick="pilihPaket(this)">35 Mbps<br>175rb</div>
      <div class="card" onclick="pilihPaket(this)">55 Mbps<br>230rb</div>
      <div class="card" onclick="pilihPaket(this)">Bundling 12 Bulan</div>
      <div class="card" onclick="pilihPaket(this)">Bundling 4 Bulan</div>
    `;
  }

  else if(cluster === "TIMUR"){
    el.innerHTML = `
      <div class="card" onclick="pilihPaket(this)">10 Mbps<br>110rb</div>
      <div class="card" onclick="pilihPaket(this)">20 Mbps<br>150rb</div>
      <div class="card" onclick="pilihPaket(this)">30 Mbps<br>190rb</div>
      <div class="card" onclick="pilihPaket(this)">50 Mbps<br>230rb</div>
      <div class="card" onclick="pilihPaket(this)">Bundling 12 Bulan</div>
      <div class="card" onclick="pilihPaket(this)">Bundling 6 Bulan</div>
      <div class="card" onclick="pilihPaket(this)">Bundling 4 Bulan</div>
    `;
  }

  else{
    el.innerHTML = `<p style="color:red;">Wilayah belum tercover</p>`;
  }
}

/* FOTO */
foto.onchange = function(){
  let reader = new FileReader();
  reader.onloadend = ()=> fotoBase64 = reader.result;
  reader.readAsDataURL(this.files[0]);
};

/* KIRIM */
function kirimData(){
  if(!nama.value || !nohp.value || !alamat.value || !paketDipilih){
    alert("Lengkapi data!");
    return;
  }

  btn.innerHTML = '<span class="loader"></span> Mengirim...';
  btn.disabled = true;

  fetch("https://script.google.com/macros/s/AKfycbyH-qNN9seTnTJa4KVi6dtfH-6XVC4xivx676aaLKGJl8RQGfiu002ocQfUFdRp-U0OjA/exec", {
    method:"POST",
    body: JSON.stringify({
      nama:nama.value,
      nohp:nohp.value,
      alamat:alamat.value,
      paket:paketDipilih,
      lokasi:lokasi,
      cluster:cluster,
      foto:fotoBase64
    })
  })
  .then(r=>r.json())
  .then(res=>{
    alert("Order ID: "+res.order_id);
    location.reload();
  })
  .catch(()=> alert("Gagal kirim"));
}
</script>

</body>
</html>
