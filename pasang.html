<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasang Baru - ERSnet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2a44, #1e5fa8);
  margin: 0;
  color: white;
}

.container {
  max-width: 500px;
  margin: 50px auto;
  background: white;
  color: black;
  padding: 30px;
  border-radius: 15px;
}

h2 {
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 15px;
  background: #1e5fa8;
  color: white;
  border: none;
  border-radius: 25px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #0f2a44;
}
</style>
</head>

<body>

<div class="container">
  <h2>Form Pasang Baru</h2>

  <input type="text" id="nama" placeholder="Nama Lengkap">
  <input type="text" id="nohp" placeholder="Nomor WhatsApp">
  <textarea id="alamat" placeholder="Alamat Lengkap"></textarea>

  <button onclick="kirimData()">Kirim</button>
</div>

<script>
function kirimData() {

  var data = {
    nama: document.getElementById("nama").value,
    nohp: document.getElementById("nohp").value,
    alamat: document.getElementById("alamat").value
  };

  fetch("https://script.google.com/macros/s/AKfycbyH-qNN9seTnTJa4KVi6dtfH-6XVC4xivx676aaLKGJl8RQGfiu002ocQfUFdRp-U0OjA/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    alert("Data berhasil dikirim!");
    window.location.href = "index.html";
  })
  .catch(err => alert("Gagal kirim data"));
}
</script>

</body>
</html>
