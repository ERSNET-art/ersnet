<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasang Baru - ERSnet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2a44, #1e5fa8);
  color: white;
}

.header {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: flex-end;
}

.logo-left, .logo-right {
  width: 100px;
}

.container {
  max-width: 500px;
  margin: 120px auto;
  background: white;
  color: black;
  padding: 25px;
  border-radius: 15px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.paket {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: #f1f1f1;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.card.active {
  border: 2px solid #1e5fa8;
  background: #e3f0ff;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1e5fa8;
  color: white;
  margin-top: 5px;
  cursor: pointer;
}

#map {
  height: 300px;
  border-radius: 10px;
  margin-top: 10px;
  display: none;
}

.loader {
  border: 3px solid #fff;
  border-top: 3px solid yellow;
  border-radius: 50%;
  width: 14px;
  height: 14px;
  display: inline-block;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.character {
  position: fixed;
  right: 10px;
  bottom: 0;
  width: 150px;
}
</style>
</head>

<body>

<div class="header">
  <img src="L_ERS.png" class="logo-right">
</div>

<div class="container">
<h2 style="text-align:center;">Untuk dapat berlangganan ErsNet Silahkan isi beberapa data dibawah ini ya</h2>

<input type="text" id="nama" placeholder="Nama Lengkap">
<input type="text" id="nohp" placeholder="Nomor WhatsApp">
<textarea id="alamat" placeholder="Alamat Lengkap"></textarea>

<b>Pilih Paket:</b>
<div class="paket">
  <div class="card" onclick="pilihPaket(this)">15 Mbps<br>125rb</div>
  <div class="card" onclick="pilihPaket(this)">20 Mbps<br>150rb</div>
  <div class="card" onclick="pilihPaket(this)">35 Mbps<br>175rb</div>
  <div class="card" onclick="pilihPaket(this)">55 Mbps<br>230rb</div>
</div>

<br>
<b>Pilih Lokasi:</b>
<button onclick="modeLokasi('gps')">📍 Lokasi Saat Ini</button>
<button onclick="modeLokasi('map')">🗺 Pilih di Peta</button>

<p id="lokasiText"></p>
<div id="map"></div>

<label><b>Masukkan Foto Rumah</b></label>
<input type="file" id="foto">

<button id="btnKirim" onclick="kirimData()">Kirim</button>
</div>

<img src="cs.png" class="character">

<!-- 🔥 API KEY SUDAH DIPASANG -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBdDFUbkc6peaordAoRzWw27JvIHpdcZ4w"></script>

<script>
let paketDipilih="", lokasi="", fotoBase64="";
let mapObj, marker;

/* PILIH PAKET */
function pilihPaket(el){
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  paketDipilih = el.innerText;
}

/* MODE LOKASI */
function modeLokasi(mode){

  if(mode==="gps"){
    navigator.geolocation.getCurrentPosition(pos=>{
      lokasi = pos.coords.latitude+","+pos.coords.longitude;
      lokasiText.innerText = "Lokasi: "+lokasi;
    }, ()=>{
      alert("Gagal ambil lokasi");
    });
    document.getElementById("map").style.display="none";
  }

  if(mode==="map"){
    document.getElementById("map").style.display="block";
    initMap();
  }
}

/* MAP */
function initMap(){
  if(mapObj) return;

  mapObj = new google.maps.Map(document.getElementById("map"), {
    center:{lat:-2.5,lng:140.7},
    zoom:13
  });

  mapObj.addListener("click", function(e){
    if(marker) marker.setMap(null);

    marker = new google.maps.Marker({
      position:e.latLng,
      map:mapObj
    });

    lokasi = e.latLng.lat()+","+e.latLng.lng();
    lokasiText.innerText = "Lokasi dipilih: "+lokasi;
  });
}

/* FOTO */
foto.onchange = function(){
  let reader = new FileReader();
  reader.onloadend = ()=> fotoBase64 = reader.result;
  reader.readAsDataURL(this.files[0]);
};

/* KIRIM DATA */
function kirimData(){
  let btn = document.getElementById("btnKirim");

  if(!nama.value || !nohp.value || !alamat.value || !paketDipilih){
    alert("Lengkapi data!");
    return;
  }

  btn.innerHTML = '<span class="loader"></span> Mengirim...';
  btn.disabled = true;

  fetch("https://script.google.com/macros/s/AKfycbyH-qNN9seTnTJa4KVi6dtfH-6XVC4xivx676aaLKGJl8RQGfiu002ocQfUFdRp-U0OjA/exec", {
    method:"POST",
    body: JSON.stringify({
      nama:nama.value,
      nohp:nohp.value,
      alamat:alamat.value,
      paket:paketDipilih,
      lokasi:lokasi,
      foto:fotoBase64
    })
  })
  .then(r=>r.json())
  .then(res=>{
    alert(
      "Terimakasih telah mempercayai ErsNet sebagai Layanan Internet pilihan anda,\n\n" +
      "Order ID anda adalah: " + res.order_id + "\n\n" +
      "Silahkan cek pada menu Track Order Baru atau hubungi CS."
    );
    location.href="index.html";
  })
  .catch(()=> alert("Gagal kirim"))
  .finally(()=>{
    btn.innerHTML="Kirim";
    btn.disabled=false;
  });
}
</script>

</body>
</html>
