<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasang Baru - ERSnet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2a44, #1e5fa8);
  color: white;
}

/* HEADER */
.header {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
}

.logo-left, .logo-right {
  width: 100px;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: 120px auto;
  background: white;
  color: black;
  padding: 25px;
  border-radius: 15px;
}

/* INPUT */
input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* PAKET CARD */
.paket {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 15px;
}

.card {
  background: #f1f1f1;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  border: 2px solid transparent;
}

.card.active {
  border: 2px solid #1e5fa8;
  background: #e3f0ff;
}

/* BUTTON */
button {
  width: 100%;
  padding: 15px;
  background: #1e5fa8;
  color: white;
  border: none;
  border-radius: 25px;
  font-weight: bold;
  cursor: pointer;
}

/* CHARACTER */
.character {
  position: fixed;
  right: 10px;
  bottom: 0;
  width: 200px;
}

/* MOBILE */
@media (max-width: 768px) {
  .character {
    width: 120px;
  }
}
</style>
</head>

<body>

<div class="header">
  <img src="L_LDP.png" class="logo-left">
  <img src="L_ERS.png" class="logo-right">
</div>

<div class="container">
  <h2>Form Pasang Baru</h2>

  <input type="text" id="nama" placeholder="Nama Lengkap">
  <input type="text" id="nohp" placeholder="Nomor WhatsApp">
  <textarea id="alamat" placeholder="Alamat Lengkap"></textarea>

  <!-- PILIH PAKET -->
  <b>Pilih Paket:</b>
  <div class="paket">
    <div class="card" onclick="pilihPaket(this)">15 Mbps<br>125rb</div>
    <div class="card" onclick="pilihPaket(this)">20 Mbps<br>150rb</div>
    <div class="card" onclick="pilihPaket(this)">35 Mbps<br>175rb</div>
    <div class="card" onclick="pilihPaket(this)">55 Mbps<br>230rb</div>
  </div>

  <!-- LOKASI -->
  <button onclick="ambilLokasi()">📍 Ambil Lokasi</button>
  <p id="lokasiText"></p>

  <!-- FOTO -->
  <input type="file" id="foto">

  <button onclick="kirimData()">Kirim</button>
</div>

<img src="cs.png" class="character">

<script>
let paketDipilih = "";
let lokasi = "";
let fotoBase64 = "";

/* PILIH PAKET */
function pilihPaket(el){
  document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  paketDipilih = el.innerText;
}

/* AMBIL LOKASI */
function ambilLokasi(){
  navigator.geolocation.getCurrentPosition(function(pos){
    lokasi = pos.coords.latitude + "," + pos.coords.longitude;
    document.getElementById("lokasiText").innerText = "Lokasi: " + lokasi;
  });
}

/* KONVERSI FOTO */
document.getElementById("foto").addEventListener("change", function(){
  let file = this.files[0];
  let reader = new FileReader();
  reader.onloadend = function(){
    fotoBase64 = reader.result;
  }
  reader.readAsDataURL(file);
});

/* KIRIM DATA */
function kirimData(){

  var data = {
    nama: document.getElementById("nama").value,
    nohp: document.getElementById("nohp").value,
    alamat: document.getElementById("alamat").value,
    paket: paketDipilih,
    lokasi: lokasi,
    foto: fotoBase64
  };

  fetch("URL_WEB_APP_KAMU", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
  alert("✅ Order berhasil!\nID: " + res.order_id);
  window.location.href = "index.html";
})
  .catch(err => alert("❌ Gagal kirim"));
}
</script>

</body>
</html>
