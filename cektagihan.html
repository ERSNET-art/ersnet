<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Bukti Tagihan</title>
</head>
<body>
<h2>Cek Tagihan & Upload Bukti</h2>

<label>No Layanan / HP:</label><br>
<input type="text" id="noLayanan"><br><br>
<button onclick="cekTagihan()">Cek Tagihan</button>

<div id="infoTagihan" style="margin-top:20px;"></div>

<div id="uploadDiv" style="display:none; margin-top:20px;">
  <label>Pilih Bukti Bayar:</label><br>
  <input type="file" id="bukti"><br><br>
  <button onclick="uploadBukti()">Upload Bukti</button>
</div>

<script>
var windowData = {};

function cekTagihan(){
  var no = document.getElementById("noLayanan").value.trim();
  if(!no){ alert("Masukkan No Layanan / HP"); return; }

  fetch("https://script.google.com/macros/s/AKfycbwgVRi6-qmCeH9Q49uURfY_n4Od_iMN8n0vuaU8SS37n4UjvpEpIFY3u5RLJcEizevo/exec?tiket_id=" + encodeURIComponent(no))
    .then(res=>res.json())
    .then(res=>{
      if(res.status==="found"){
        windowData.no_layanan = res.no_layanan;
        windowData.nama = res.nama;
        document.getElementById("infoTagihan").innerHTML = 
          "Nama: " + res.nama + "<br>" +
          "No Layanan: " + res.no_layanan + "<br>" +
          "Tagihan: " + res.tagihan + "<br>" +
          "Status Bayar: " + res.status_bayar;
        document.getElementById("uploadDiv").style.display = "block";
      } else {
        alert("Tagihan tidak ditemukan!");
        document.getElementById("uploadDiv").style.display = "none";
      }
    })
    .catch(err=>{
      console.error(err);
      alert("❌ Koneksi gagal");
    });
}

function uploadBukti(){
  var file = document.getElementById("bukti").files[0];
  if(!file){ alert("Pilih file dulu!"); return; }

  var reader = new FileReader();
  reader.onloadend = function(){
    var base64 = reader.result;

    fetch("https://script.google.com/macros/s/AKfycbwgVRi6-qmCeH9Q49uURfY_n4Od_iMN8n0vuaU8SS37n4UjvpEpIFY3u5RLJcEizevo/exec", {
      method: "POST",
      body: JSON.stringify({
        type: "bukti",
        nama: windowData.nama,
        no_layanan: windowData.no_layanan,
        foto: base64
      })
    })
    .then(res=>res.json())
    .then(res=>{
      if(res.status==="success"){
        alert("✅ Bukti berhasil dikirim dan tersimpan di Sheet");
        location.reload();
      } else {
        alert("❌ Upload gagal: " + (res.message || "unknown error"));
      }
    })
    .catch(err=>{
      console.error(err);
      alert("❌ Upload gagal (koneksi)");
    });
  };
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
