<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Tagihan - ERSnet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2a44, #1e5fa8);
  color: white;
}

/* HEADER LOGO */
.header {
  position: absolute;
  top: 20px;
  right: 20px;
}

.logo {
  width: 100px;
}

/* CARD */
.container {
  max-width: 500px;
  margin: 120px auto;
  background: white;
  color: black;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
}

input, button {
  width: 100%;
  max-width: 350px;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #1e5fa8;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  text-align: left;
  font-size: 14px;
}

.loader {
  border: 4px solid #eee;
  border-top: 4px solid #1e5fa8;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  margin: 20px auto;
  animation: spin 1s linear infinite;
}

img.qr {
  margin-top: 10px;
  border-radius: 10px;
}

/* CHARACTER */
.character {
  position: fixed;
  right: 10px;
  bottom: 0;
  width: 180px;
}

@media (max-width: 768px) {
  .character {
    width: 120px;
  }
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<!-- 🔥 LOGO -->
<div class="header">
  <img src="https://raw.githubusercontent.com/ERSNET-art/ersnet/main/L_ERS.png" class="logo">
</div>

<!-- 🔥 CONTENT -->
<div class="container">
  <h2>Cek Tagihan</h2>
  <p>Masukkan No Layanan / No HP</p>

  <input type="text" id="input" placeholder="Contoh: 12345 / 0812xxx">
  <button id="btn" onclick="cekTagihan()">Cek Tagihan</button>

  <div id="loading" style="display:none;">
    <div class="loader"></div>
    <div>Sedang memproses...</div>
  </div>

  <div id="hasil" class="result"></div>
</div>

<!-- 🔥 CHARACTER CS -->
<img src="https://raw.githubusercontent.com/ERSNET-art/ersnet/main/cs.png" class="character">

<script>
// FORMAT NOMOR
function formatInput(val){
  val = val.replace(/\D/g, "");

  if(val.startsWith("08")){
    return "62" + val.substring(1);
  }

  return val;
}

// CEK TAGIHAN
function cekTagihan(){

  var input = document.getElementById("input").value.trim();
  var hasil = document.getElementById("hasil");
  var loading = document.getElementById("loading");
  var btn = document.getElementById("btn");

  if(!input){
    alert("Masukkan data terlebih dahulu!");
    return;
  }

  var kirim = formatInput(input);

  hasil.innerHTML = "";
  loading.style.display = "block";
  btn.disabled = true;
  btn.innerText = "Memproses...";

  fetch("https://script.google.com/macros/s/AKfycbwgVRi6-qmCeH9Q49uURfY_n4Od_iMN8n0vuaU8SS37n4UjvpEpIFY3u5RLJcEizevo/exec?tiket_id=" + kirim)
  .then(res => res.json())
  .then(res => {

    if(res.status === "found" && res.type === "tagihan"){

      if(res.status_bayar === "BELUM BAYAR"){
        hasil.innerHTML = `
          <b>No Layanan:</b> ${res.no_layanan}<br>
          <b>Nama:</b> ${res.nama}<br>
          <b>Tagihan:</b> Rp ${res.tagihan}<br>
          <b>Status:</b> ❌ BELUM BAYAR<br><br>

          <center>
            <b>Scan QR untuk pembayaran</b><br>
            <img src="https://raw.githubusercontent.com/ERSNET-art/ersnet/main/QRers.jpeg" width="200">
          </center>

          <hr>

          <b>Jika sudah melakukan pembayaran, upload bukti:</b><br>
          <input type="file" id="bukti" accept="image/*"><br>
          <button onclick="uploadBukti('${res.no_layanan}','${res.nama}')">Kirim Bukti</button>
        `;
      } else {
        hasil.innerHTML = `
          <b>No Layanan:</b> ${res.no_layanan}<br>
          <b>Nama:</b> ${res.nama}<br>
          <b>Tagihan:</b> Rp ${res.tagihan}<br>
          <b>Status:</b> ✅ SUDAH BAYAR
        `;
      }

    } else {
      hasil.innerHTML = "❌ Tagihan tidak ditemukan";
    }

  })
  .catch(() => {
    hasil.innerHTML = "❌ Gagal mengambil data";
  })
  .finally(() => {
    loading.style.display = "none";
    btn.disabled = false;
    btn.innerText = "Cek Tagihan";
  });
}

// UPLOAD BUKTI
function uploadBukti(no_layanan, nama){

  var fileInput = document.getElementById("bukti");
  var file = fileInput.files[0];

  if(!file){
    alert("Silahkan pilih bukti pembayaran!");
    return;
  }

  var reader = new FileReader();

  reader.onload = function(e){

    var base64 = e.target.result;

    fetch("https://script.google.com/macros/s/AKfycbwgVRi6-qmCeH9Q49uURfY_n4Od_iMN8n0vuaU8SS37n4UjvpEpIFY3u5RLJcEizevo/exec", {
      method: "POST",
      body: JSON.stringify({
        type: "bukti",
        no_layanan: no_layanan,
        nama: nama,
        foto: base64
      })
    })
    .then(() => {
      alert("✅ Bukti berhasil dikirim!");
    })
    .catch(() => {
      alert("❌ Upload gagal");
    });

  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
