<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lacak Tiket Gangguan - ERSnet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2a44, #1e5fa8);
  color: white;
}

.header {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: flex-end;
}

.logo-left, .logo-right {
  width: 100px;
}

.container {
  max-width: 500px;
  margin: 120px auto;
  background: white;
  color: black;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
}

.form-group {
  display: flex;
  flex-direction: column;
  align-items: center;
}

input {
  width: 100%;
  max-width: 350px;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  text-align: center;
}

button {
  width: 100%;
  max-width: 350px;
  padding: 12px;
  background: #1e5fa8;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  text-align: left;
  font-size: 14px;
  animation: fadeIn 0.5s ease;
}

.loader {
  border: 4px solid #eee;
  border-top: 4px solid #1e5fa8;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  margin: 20px auto;
  animation: spin 1s linear infinite;
}

.loading-text {
  text-align: center;
  font-size: 14px;
  color: #555;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

.character {
  position: fixed;
  right: 10px;
  bottom: 0;
  width: 200px;
}

@media (max-width: 768px) {
  .character {
    width: 120px;
  }
}
</style>
</head>

<body>

<div class="header">
  <img src="L_ERS.png" class="logo-right">
</div>

<div class="container">
  <h2>Lacak Tiket Gangguan</h2>

  <div class="form-group">
    <input type="text" id="tiket_id" placeholder="Masukkan ID Tiket">
    <button id="btnCek" onclick="cekTiket()">Cek Tiket</button>
  </div>

  <div id="loading" style="display:none;">
    <div class="loader"></div>
    <div class="loading-text">Sedang mencari data...</div>
  </div>

  <div id="hasil" class="result"></div>
</div>

<img src="cs.png" class="character">

<script>
function cekTiket(){

  var id = document.getElementById("tiket_id").value;
  var hasil = document.getElementById("hasil");
  var loading = document.getElementById("loading");
  var btn = document.getElementById("btnCek");

  if(!id){
    alert("Masukkan ID Tiket dulu!");
    return;
  }

  hasil.innerHTML = "";
  loading.style.display = "block";
  btn.disabled = true;
  btn.innerText = "Memproses...";

  fetch("https://script.google.com/macros/s/AKfycbyH-qNN9seTnTJa4KVi6dtfH-6XVC4xivx676aaLKGJl8RQGfiu002ocQfUFdRp-U0OjA/exec?tiket_id=" + id)
  .then(res => res.json())
  .then(res => {

    if(res.status === "found"){
      hasil.innerHTML = `
        <b>ID Tiket:</b> ${res.tiket_id}<br>
        <b>No Layanan:</b> ${res.no_layanan}<br>
        <b>Nama:</b> ${res.nama}<br>
        <b>No HP:</b> ${res.nohp}<br>
        <b>Keluhan:</b> ${res.keluhan}<br>
        <b>Status:</b> ${res.status_tiket}
      `;
    } else {
      hasil.innerHTML = "❌ Tiket tidak ditemukan";
    }

  })
  .catch(() => {
    hasil.innerHTML = "❌ Gagal mengambil data";
  })
  .finally(() => {
    loading.style.display = "none";
    btn.disabled = false;
    btn.innerText = "Cek Tiket";
  });
}
</script>

</body>
</html>
