<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lapor Gangguan - ERSnet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2a44, #1e5fa8);
  color: white;
}

.header {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
}

.logo-left, .logo-right {
  width: 100px;
}

.container {
  max-width: 500px;
  margin: 120px auto;
  background: white;
  color: black;
  padding: 25px;
  border-radius: 15px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #1e5fa8;
  color: white;
  border: none;
  border-radius: 25px;
}

.loader {
  border: 3px solid #eee;
  border-top: 3px solid #1e5fa8;
  border-radius: 50%;
  width: 15px;
  height: 15px;
  display: inline-block;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.character {
  position: fixed;
  right: 10px;
  bottom: 0;
  width: 150px;
}
</style>
</head>

<body>

<div class="header">
  <img src="L_LDP.png" class="logo-left">
  <img src="L_ERS.png" class="logo-right">
</div>

<div class="container">
<h2 style="text-align:center;">Lapor Gangguan</h2>

<input type="text" id="no_layanan" placeholder="Nomor Layanan">
<input type="text" id="nama" placeholder="Nama">
<input type="text" id="nohp" placeholder="No HP">
<textarea id="keluhan" placeholder="Keluhan"></textarea>

<label><b>Foto Modem/Perangkat</b></label>
<input type="file" id="foto">

<button id="btnKirim" onclick="kirim()">Kirim Laporan</button>
</div>

<img src="cs.png" class="character">

<script>
let fotoBase64="";

foto.onchange = function(){
  let reader = new FileReader();
  reader.onloadend = ()=> fotoBase64 = reader.result;
  reader.readAsDataURL(this.files[0]);
};

function kirim(){
  let btn = btnKirim;

  if(!no_layanan.value || !nama.value || !nohp.value || !keluhan.value){
    alert("Lengkapi data!");
    return;
  }

  btn.innerHTML = '<span class="loader"></span> Mengirim...';
  btn.disabled = true;

  fetch("https://script.google.com/macros/s/AKfycbyH-qNN9seTnTJa4KVi6dtfH-6XVC4xivx676aaLKGJl8RQGfiu002ocQfUFdRp-U0OjA/exec", {
    method:"POST",
    body: JSON.stringify({
      type:"gangguan",
      no_layanan:no_layanan.value,
      nama:nama.value,
      nohp:nohp.value,
      keluhan:keluhan.value,
      foto:fotoBase64
    })
  })
  .then(r=>r.json())
  .then(res=>{
    alert("Tiket berhasil dibuat!\nID: "+res.tiket_id);
    location.href="index.html";
  })
  .finally(()=>{
    btn.innerHTML="Kirim Laporan";
    btn.disabled=false;
  });
}
</script>

</body>
</html>
